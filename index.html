<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Trang học tập lớp 5</title>

<style>

body{
margin:0;
font-family: Arial, sans-serif;
text-align:center;

background-image: url("bando.jpg");
background-size: cover;
background-position: center;
background-attachment: fixed;
}

/* lớp phủ làm mờ nền */

.overlay{
background: rgba(255,255,255,0.7);
min-height:100vh;
padding-top:60px;
}

/* tiêu đề */

h1{
background:white;
display:inline-block;
padding:15px 40px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* container */

.container{
margin-top:120px;
display:flex;
justify-content:center;
gap:120px;
}

/* box */

.box{
width:260px;
height:150px;

display:flex;
justify-content:center;
align-items:center;

background:white;
border-radius:20px;

font-size:30px;
font-weight:bold;

box-shadow:0 8px 20px rgba(0,0,0,0.2);

transition:0.3s;
}

.box:hover{
background:#dceeff;
transform:scale(1.08);
}

/* link */

a{
text-decoration:none;
color:black;
}

</style>

</head>

<body>

<div class="overlay">

<h1>TRANG HỌC TẬP LỚP 5</h1>

<div class="container">

<a href="lichsu.html">
<div class="box">LỊCH SỬ</div>
</a>

<a href="dialy.html">
<div class="box">ĐỊA LÝ</div>
</a>

</div>

</div>

</body>

</html>
